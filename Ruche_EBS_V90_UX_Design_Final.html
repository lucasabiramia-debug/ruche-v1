function followerLabel(person){const f=followersOf(person);return f?Math.round(f/100)/10+'K abonnés':'Sans audience propre'}
function marketOf(item){if(item.market)return item.market;const txt=normalize(JSON.stringify(item));if(/maroc|casablanca/.test(txt))return'Maroc';if(/liban|beyrouth/.test(txt))return'Liban';if(/italie|milan|rome/.test(txt))return'Italie';if(/espagne|barcelone|madrid/.test(txt))return'Espagne';if(/nepal|kathmandu/.test(txt))return'Népal';if(/inde|mumbai/.test(txt))return'Inde';if(/vietnam|saigon/.test(txt))return'Vietnam';if(/ivoire|abidjan/.test(txt))return"Côte d’Ivoire";if(/canada|montreal/.test(txt))return'Canada';if(/usa|nyc|new york/.test(txt))return'USA';if(/dubai/.test(txt))return'Dubai';return'France'}
function audienceOf(item){if(item.audience)return item.audience;const txt=normalize(JSON.stringify(item));if(/parent/.test(txt))return'parents';if(/alumni/.test(txt))return'alumni';if(/etudiant|student|msc/.test(txt))return'étudiants';return'lycéens'}
function campaignMarket(item){if(item.market)return item.market;const txt=normalize(item.title+' '+item.objective);for(const [market,re] of [['Maroc',/maroc/],['Liban',/liban|diaspora/],['Italie',/italie|milan|rome/],['Espagne',/espagne/],['Népal',/nepal/],['Inde',/inde/],['Vietnam',/vietnam/],["Côte d’Ivoire",/ivoire|abidjan/],['Canada',/canada|montreal/],['USA',/usa|new york/],['Dubai',/dubai/]])if(re.test(txt))return market;return'France'}
function categoryOf(item){const status=effectiveStatus(item);return status==='Terminée'?'done':(status==='Programmée'||status==='Brouillon')?'prepare':'active'}
function totals(item){const ids=campaignPeople(item);const sum=key=>ids.reduce((acc,id)=>acc+safeNumber(performance(item.id,id)[key]),0);const attributed={cost:sum('cost'),views:sum('views'),clicks:sum('clicks'),rdv:sum('rdv'),dossiers:sum('dossiers'),inscrits:sum('inscrits'),assets:sum('assets'),leads:sum('leads')};const raw=store.counters[item.id]||{};const has=key=>Object.prototype.hasOwnProperty.call(raw,key);const confirmed=counterValues(item.id);const pick=key=>has(key)?confirmed[key]:(attributed[key]||0);const sourceOf=key=>has(key)?'admissions':(attributed[key]>0?'attributed':'none');return{cost:attributed.cost,views:attributed.views,clicks:attributed.clicks,assets:attributed.assets,leads:pick('leads'),rdv:pick('rdv'),dossiers:pick('dossiers'),inscrits:pick('inscrits'),sources:{leads:sourceOf('leads'),rdv:sourceOf('rdv'),dossiers:sourceOf('dossiers'),inscrits:sourceOf('inscrits')},attributed}}
function inferredProof(campaignId,personId){const row=performance(campaignId,personId),paid=String(row.paid||'');if(personId==='office'||/À payer|Payé|Interne|preuve OK/i.test(paid))return'validated';if(safeNumber(row.views)+safeNumber(row.clicks)+safeNumber(row.assets)>0)return'received';return'missing'}
function proofKey(campaignId,personId){return `${campaignId}:${personId}`}
function proofState(campaignId,personId){return store.proofStates[proofKey(campaignId,personId)]||inferredProof(campaignId,personId)}
function proofLabel(value){return value==='validated'?'Validée':value==='received'?'Reçue':'Manquante'}
function proofTone(value){return value==='validated'?'tone-green':value==='received'?'tone-amber':'tone-red'}
function setProof(campaignId,personId,value){if(!['missing','received','validated'].includes(value))return;const next={...store.proofStates,[proofKey(campaignId,personId)]:value};if(commit('proofStates',next,'Statut de preuve mis à jour'))render()}
function defaultPayment(campaignId,personId){if(personId==='office')return'internal';const row=performance(campaignId,personId),paid=normalize(row.paid);if(/\bpaye\b|regle|verse/.test(paid))return'paid';if(proofState(campaignId,personId)!=='validated')return'blocked';if(/a payer|preuve ok|livraison|post|presence/.test(paid)||safeNumber(row.cost)>0)return'due';return'none'}
function paymentState(campaignId,personId){const override=store.paymentStates[proofKey(campaignId,personId)];if(override==='paid')return'paid';if(override==='litige')return'litige';if(proofState(campaignId,personId)!=='validated')return'blocked';return override||defaultPayment(campaignId,personId)}
function paymentLabel(value){return value==='paid'?'Payé':value==='due'?'À payer':value==='litige'?'Litige':value==='internal'?'Interne':value==='none'?'Non dû':'Bloqué'}
function setPayment(campaignId,personId,value){if(!['due','paid','litige'].includes(value))return;if(value!=='litige'&&proofState(campaignId,personId)!=='validated'){toast('Validez d’abord la preuve');return}const next={...store.paymentStates,[proofKey(campaignId,personId)]:value};if(commit('paymentStates',next,'Paiement mis à jour'))render()}

function costRatio(cost,count){cost=safeNumber(cost);count=safeNumber(count);return cost>0&&count>0?cost/count:0}
function rowMetrics(campaignId,personId,row=performance(campaignId,personId)){const cfg=performanceConfig(),cost=safeNumber(row.cost),leads=safeNumber(row.leads),rdv=safeNumber(row.rdv),present=safeNumber(row.present),inscrits=safeNumber(row.inscrits),cpl=costRatio(cost,leads),cpr=costRatio(cost,rdv||present),cpi=costRatio(cost,inscrits);return{cost,leads,rdv,present,inscrits,cpl,cpr,cpi,cplHigh:!!cpl&&cpl>cfg.cplMax,cprHigh:!!cpr&&cpr>cfg.cprMax}}
function justificationKey(campaignId,personId){return `${campaignId}:${personId}`}
function rebookJustification(campaignId,personId){return String((store.rebookJustifications||{})[justificationKey(campaignId,personId)]||'')}
function needsRebookJustification(campaignId,personId){const m=rowMetrics(campaignId,personId);return decisionState(campaignId,personId)==='rebook'&&(m.cplHigh||m.cprHigh)}
function wouldNeedRebookJustification(campaignId,personId){const m=rowMetrics(campaignId,personId);return m.cplHigh||m.cprHigh}
function confirmRebookJustification(campaignId,personId){const note=String(document.getElementById('rebookJustificationNote')?.value||'').trim();if(note.length<12){toast('Ajoutez une justification courte mais explicite');return}const key=justificationKey(campaignId,personId),nextJustifications={...(store.rebookJustifications||{}),[key]:note},nextDecisions={...store.creatorDecisions,[key]:'rebook'};if(!commit('rebookJustifications',nextJustifications))return;if(!commit('creatorDecisions',nextDecisions))return;state.modal=null;render();toast('Rebook justifié et enregistré')}
function rebookGuardNote(campaignId,personId){const m=rowMetrics(campaignId,personId),note=rebookJustification(campaignId,personId);if(decisionState(campaignId,personId)!=='rebook'||!(m.cplHigh||m.cprHigh))return'';return note?`<div class="justification-note"><b>Rebook justifié :</b> ${esc(note)}</div>`:`<div class="rebook-guard"><b>Rebook à justifier :</b> CPL ${m.cpl?m.cpl.toFixed(1)+'€':'N/A'} / CPR ${m.cpr?m.cpr.toFixed(1)+'€':'N/A'} au-dessus des seuils actifs.</div>`}

function defaultDecision(campaignId,personId){const raw=normalize(performance(campaignId,personId).decision);if(/rebook|garder|actif durable/.test(raw))return'rebook';if(/tester/.test(raw))return'test';if(/couper|arreter|stop/.test(raw))return'stop';return'pending'}
function decisionState(campaignId,personId){return store.creatorDecisions[proofKey(campaignId,personId)]||defaultDecision(campaignId,personId)}
function decisionLabel(value){return({pending:'À décider',rebook:'À réactiver',test:'À tester',stop:'À arrêter'})[value]||'À décider'}
function decisionTone(value){return value==='rebook'?'tone-green':value==='test'?'tone-amber':value==='stop'?'tone-red':'tone-neutral'}
function setCreatorDecision(campaignId,personId,value){if(!['pending','rebook','test','stop'].includes(value))return;if(value==='rebook'&&wouldNeedRebookJustification(campaignId,personId)&&!rebookJustification(campaignId,personId)){state.modal={type:'rebookJustification',campaignId,personId};render();return}const next={...store.creatorDecisions,[proofKey(campaignId,personId)]:value};if(commit('creatorDecisions',next,'Décision mise à jour'))render()}
function proofProgress(item){const ids=campaignPeople(item).filter(id=>id!=='office'),done=ids.filter(id=>proofState(item.id,id)==='validated').length;return{done,total:ids.length,missing:Math.max(0,ids.length-done)}}
function campaignResult(item){const t=totals(item);if(effectiveStatus(item)==='Terminée')return t.inscrits?`${t.inscrits} inscription${t.inscrits>1?'s':''}`:`${t.dossiers} dossier${t.dossiers>1?'s':''}`;return`${t.rdv} RDV`}
function budgetNumber(item){return safeNumber(item.budget)||totals(item).cost||0}
function priorityActions(item){const ids=campaignPeople(item).filter(id=>id!=='office'),actions=[],incoming=inboundCounts(item.id).new;if(incoming)actions.push(`Examiner ${incoming} candidature${incoming>1?'s':''} entrante${incoming>1?'s':''}`);const missing=ids.find(id=>proofState(item.id,id)==='missing');if(missing)actions.push(`Récupérer la preuve de ${person(missing).name}`);const due=ids.find(id=>paymentState(item.id,id)==='due');if(due)actions.push(`Valider le paiement de ${person(due).name}`);const pending=ids.find(id=>decisionState(item.id,id)==='pending');if(pending)actions.push(`Décider de la suite avec ${person(pending).name}`);if(item.next&&!actions.includes(item.next))actions.push(item.next);return actions.slice(0,3)}
function actionCounts(){const active=allCampaigns().filter(item=>categoryOf(item)==='active');const counts={proof:0,payment:0,decision:0,inbound:0,activeCampaigns:active.length};active.forEach(item=>{const inb=inboundCounts(item.id).new;counts.inbound+=inb;counts.decision+=inb;campaignPeople(item).filter(id=>id!=='office').forEach(id=>{if(proofState(item.id,id)!=='validated')counts.proof++;if(paymentState(item.id,id)==='due')counts.payment++;if(decisionState(item.id,id)==='pending')counts.decision++})});return counts}
function campaignHasAction(item,type){const ids=campaignPeople(item).filter(id=>id!=='office');if(type==='proof')return ids.some(id=>proofState(item.id,id)!=='validated');if(type==='payment')return ids.some(id=>paymentState(item.id,id)==='due');if(type==='decision')return inboundCounts(item.id).new>0||ids.some(id=>decisionState(item.id,id)==='pending');if(type==='inbound')return inboundCounts(item.id).new>0;return true}

function handleNavKey(event){if(!['ArrowLeft','ArrowRight','Home','End'].includes(event.key))return;event.preventDefault();const tabs=[...document.querySelectorAll('.nav-button[role="tab"]')],current=tabs.indexOf(event.currentTarget);let next=current;if(event.key==='ArrowRight')next=(current+1)%tabs.length;if(event.key==='ArrowLeft')next=(current-1+tabs.length)%tabs.length;if(event.key==='Home')next=0;if(event.key==='End')next=tabs.length-1;const target=tabs[next];if(target){if(state.space==='createur')setCreatorTab(target.dataset.tab);else setTab(target.dataset.tab);requestAnimationFrame(()=>document.querySelector(`.nav-button[data-tab="${target.dataset.tab}"]`)?.focus())}}

function formatCompact(value){const n=safeNumber(value);if(n>=1000000)return(n/1000000).toFixed(n>=10000000?0:1).replace('.0','')+'M';if(n>=1000)return(n/1000).toFixed(n>=10000?0:1).replace('.0','')+'K';return number(n)}
function channelIcon(channel){return({TikTok:'♪',Instagram:'◎',LinkedIn:'in',WhatsApp:'◉',Terrain:'⌖',UGC:'▶',CRM:'◆'})[channel]||'●'}

function activeCreatorPerson(){if(!state.activeCreatorId)return null;if(store.externalCreators[state.activeCreatorId])return externalCreatorAsPerson(store.externalCreators[state.activeCreatorId]);if(isDemoPersonaId(state.activeCreatorId))return person(state.activeCreatorId);return null}

function creatorParticipationRows(personId){return allCampaigns().filter(item=>campaignPeople(item).includes(personId)).map(item=>({item,row:performance(item.id,personId)})).sort((a,b)=>{const rank=x=>categoryOf(x.item)==='active'?0:categoryOf(x.item)==='prepare'?1:2;return rank(a)-rank(b)||a.item.title.localeCompare(b.item.title,'fr')})}
function creatorAggregate(personId){const rows=creatorParticipationRows(personId),sum=key=>rows.reduce((acc,x)=>acc+safeNumber(x.row[key]),0);return{missions:rows.length,cost:sum('cost'),views:sum('views'),clicks:sum('clicks'),leads:sum('leads'),present:sum('present'),rdv:sum('rdv'),dossiers:sum('dossiers'),inscrits:sum('inscrits'),assets:sum('assets')}}
function creatorAttributionRef(item,personId){const p=person(personId),campaignSlug=String(item.id||'mission').replace(/[^a-z0-9]/gi,'').slice(0,9).toUpperCase(),personSlug=String(personId||initials(p)).replace(/[^a-z0-9]/gi,'').slice(0,7).toUpperCase(),code=`EBS-${campaignSlug}-${personSlug}`,live=trackingLinkFor(item);return{code,link:live?live+'?creator='+encodeURIComponent(personId):'',preview:activeDataMode==='demo'?'/demo/r/'+campaignSlug.toLowerCase()+'-'+personSlug.toLowerCase():''}}
function copyCreatorAttributionRef(campaignId,personId){const item=campaign(campaignId),ref=creatorAttributionRef(item,personId),text=[ref.link||ref.preview,ref.code].filter(Boolean).join(' · ');copyText(text)}
function creatorChannelSummary(personId){const map=new Map();creatorParticipationRows(personId).forEach(({item,row})=>{const channel=person(personId).channel||'Autre',cur=map.get(channel)||{channel,views:0,clicks:0,leads:0,rdv:0,inscrits:0,missions:0};cur.views+=safeNumber(row.views);cur.clicks+=safeNumber(row.clicks);cur.leads+=safeNumber(row.leads);cur.rdv+=safeNumber(row.rdv);cur.inscrits+=safeNumber(row.inscrits);cur.missions++;map.set(channel,cur)});return [...map.values()]}
function creatorContributionCard(item,personId){const p=person(personId),r=performance(item.id,personId),ref=creatorAttributionRef(item,personId),ps=proofState(item.id,personId),pay=paymentState(item.id,personId),decision=decisionState(item.id,personId),hasSignal=safeNumber(r.views)+safeNumber(r.clicks)+safeNumber(r.leads)+safeNumber(r.rdv)+safeNumber(r.inscrits)>0;return `<article class="creator-contribution"><div class="creator-contribution-head"><div><div class="eyebrow">${esc(campaignMarket(item))} · ${esc(p.channel)}</div><h3>${item.emoji||'▣'} ${esc(item.title)}</h3></div>${badge(effectiveStatus(item),statusTone(effectiveStatus(item)))}</div><p class="tiny" style="margin-top:4px">${esc(p.deliverables||item.objective||'Mission Ruche')}</p><div class="reference-line">${badge('Preuve '+proofLabel(ps),proofTone(ps))}${badge('Paiement '+paymentLabel(pay),pay==='paid'?'tone-green':pay==='due'?'tone-amber':'tone-neutral')}${badge(decisionLabel(decision),decisionTone(decision))}</div><div class="creator-attribution"><b style="font-size:9px;text-transform:uppercase;color:var(--muted)">${ref.link?'Mon lien attribué':activeDataMode==='demo'?'Aperçu du lien démo':'Mon code attribué'}</b><code>${esc(ref.link||ref.preview||ref.code)}</code><small>Code associé : ${esc(ref.code)} · l’attribution reste à confirmer par Admissions.</small><button class="secondary full" style="margin-top:7px;min-height:31px" onclick="copyCreatorAttributionRef('${item.id}','${personId}')">Copier le lien / code</button></div>${hasSignal?`<div class="creator-mini-funnel"><div><b>${formatCompact(r.views)}</b><span>vues</span></div><div><b>${formatCompact(r.clicks)}</b><span>clics</span></div><div><b>${number(r.leads)}</b><span>leads</span></div><div><b>${number(r.rdv)}</b><span>RDV</span></div></div><div class="creator-callout"><b>Signal attribué :</b> ${number(r.leads)} leads, ${number(r.rdv)} RDV, ${number(r.dossiers)} dossiers et ${number(r.inscrits)} inscription${safeNumber(r.inscrits)>1?'s':''}. ${activeDataMode==='demo'?'Données fictives pour illustrer le parcours.':'À confirmer dans les données Admissions.'}</div>`:`<div class="zero-signal">Mission associée au profil. Les résultats restent à saisir après réception de la preuve et confirmation Admissions.</div>`}</article>`}
function creatorDashboardHtml(personId){const p=person(personId),a=creatorAggregate(personId),rows=creatorParticipationRows(personId),channels=creatorChannelSummary(personId);return `<section class="creator-dashboard-hero ${avatarClass(p.channel)}"><div class="between center"><div class="row" style="gap:10px">${avatar(p)}<div><div class="eyebrow">${activeDataMode==='demo'?'Profil de démonstration':'Mon tableau de bord'}</div><h1>${esc(p.name)}</h1><p class="tiny">${esc(p.kind||p.type||'Créateur / relais')} · ${esc(p.channel||'—')} · ${esc(marketOf(p))}</p></div></div><span class="demo-ribbon">${activeDataMode==='demo'?'Démo fictive':'Local'}</span></div><div class="creator-impact-grid"><div class="creator-impact-kpi"><b>${formatCompact(a.views)}</b><span>vues</span></div><div class="creator-impact-kpi"><b>${formatCompact(a.clicks)}</b><span>clics</span></div><div class="creator-impact-kpi"><b>${number(a.leads)}</b><span>leads</span></div><div class="creator-impact-kpi"><b>${number(a.rdv)}</b><span>RDV</span></div><div class="creator-impact-kpi"><b>${number(a.inscrits)}</b><span>inscrits</span></div><div class="creator-impact-kpi"><b>${money(a.cost)}</b><span>contreparties</span></div></div></section>${activeDataMode==='demo'?'<div class="mission-demo-note"><b>Scénario de démonstration :</b> ces chiffres servent uniquement à montrer ce que le créateur pourrait suivre. Ils ne sont pas des résultats EBS réels.</div>':''}${channels.length?`<section class="creator-platform-summary"><div class="between center"><div><div class="eyebrow">Performance par canal</div><h3>Mon empreinte créateur</h3></div>${badge(rows.length+' campagne'+(rows.length>1?'s':''),'tone-blue')}</div>${channels.map(c=>`<div class="creator-platform-row"><span class="platform-chip ${avatarClass(c.channel)}">${channelIcon(c.channel)} ${esc(c.channel)}</span><div style="text-align:right"><b style="font-size:11px">${formatCompact(c.views)} vues · ${number(c.leads)} leads</b><small>${number(c.rdv)} RDV · ${number(c.inscrits)} inscrit${c.inscrits>1?'s':''}</small></div></div>`).join('')}</section>`:''}<div class="section-label">Mes campagnes</div>${rows.length?rows.map(x=>creatorContributionCard(x.item,personId)).join(''):'<div class="empty">Aucune campagne associée à ce profil pour l’instant.</div>'}`}
function creatorJourneyData(personId){
  const hasProfile=!!personId&&!!activeCreatorPerson();
  if(!hasProfile)return{current:0,complete:-1,finished:false,label:'Créez votre profil'};
  const apps=[];
  for(const item of allCampaigns())for(const app of inboundApplications(item.id).filter(a=>a.personId===personId))apps.push({item,app});
  const acceptedItems=allCampaigns().filter(item=>campaignPeople(item).includes(personId));
  const liveApps=apps.filter(x=>x.app.status!=='declined');
  const hasApplication=liveApps.length>0||acceptedItems.length>0;
  const hasAccepted=acceptedItems.length>0||liveApps.some(x=>x.app.status==='accepted');
  if(!hasApplication)return{current:1,complete:0,finished:false,label:'Choisissez une mission'};
  if(!hasAccepted)return{current:2,complete:1,finished:false,label:'Validation humaine en attente'};
  const items=acceptedItems.length?acceptedItems:liveApps.filter(x=>x.app.status==='accepted').map(x=>x.item);
  const proofRows=[];
  for(const item of items)proofRows.push({proof:proofState(item.id,personId),payment:paymentState(item.id,personId)});
  if(!proofRows.length||proofRows.every(x=>x.proof==='missing'))return{current:3,complete:2,finished:false,label:'Création du livrable'};
  if(proofRows.some(x=>x.proof==='received'))return{current:4,complete:3,finished:false,label:'Preuve à faire valider'};
  if(proofRows.some(x=>x.proof==='validated')&&!proofRows.every(x=>['paid','internal','none'].includes(x.payment)))return{current:5,complete:4,finished:false,label:'Paiement selon accord'};
  if(proofRows.length&&proofRows.every(x=>x.proof==='validated'&&['paid','internal','none'].includes(x.payment)))return{current:5,complete:5,finished:true,label:'Parcours terminé'};
  return{current:3,complete:2,finished:false,label:'Création du livrable'};
}
function creatorJourneyHtml(personId){const data=creatorJourneyData(personId),steps=[['Profil','Identité & contact'],['Candidature','Mission choisie'],['Acceptation','Décision humaine'],['Création','Livrable'],['Preuve','Conformité'],['Paiement','Selon accord']];return `<section class="creator-journey" aria-label="Parcours créateur"><div class="creator-journey-head"><div><div class="eyebrow">Mon parcours</div><h2>${esc(data.label)}</h2></div><span class="journey-status ${data.finished?'complete':''}">${data.finished?'Terminé':'Étape '+(data.current+1)+' / 6'}</span></div><ol>${steps.map(([title,sub],index)=>`<li class="${index<=data.complete?'complete':index===data.current?'current':''}" ${index===data.current?'aria-current="step"':''}><span class="journey-dot">${index<data.current||index<=data.complete?'✓':index+1}</span><span><b>${title}</b><small>${sub}</small></span></li>`).join('')}</ol><p class="journey-doctrine">L’acceptation, la validation de preuve et le paiement restent humains. Aucun envoi ni paiement automatique.</p></section>`}

function campaignSignalStrip(item){const t=totals(item),has=safeNumber(t.views)+safeNumber(t.clicks)+safeNumber(t.leads)+safeNumber(t.rdv)+safeNumber(t.inscrits)>0;if(!has)return `<div class="zero-signal">Test non lancé ou résultats non renseignés — aucune performance inventée.</div>`;return `<div class="campaign-signal-strip"><div class="campaign-signal"><b>${formatCompact(t.views)}</b><span>vues</span></div><div class="campaign-signal"><b>${number(t.leads)}</b><span>leads</span></div><div class="campaign-signal"><b>${number(t.rdv)}</b><span>RDV</span></div><div class="campaign-signal highlight"><b>${number(t.inscrits)}</b><span>inscrits</span></div></div>`}

function campaignChannelSummary(item){const map=new Map();campaignPeople(item).filter(id=>id!=='office').forEach(id=>{const p=person(id),r=performance(item.id,id),key=p.channel||'Autre',cur=map.get(key)||{channel:key,views:0,clicks:0,leads:0,rdv:0,dossiers:0,inscrits:0,people:0};cur.views+=safeNumber(r.views);cur.clicks+=safeNumber(r.clicks);cur.leads+=safeNumber(r.leads);cur.rdv+=safeNumber(r.rdv);cur.dossiers+=safeNumber(r.dossiers);cur.inscrits+=safeNumber(r.inscrits);cur.people++;map.set(key,cur)});return [...map.values()].sort((a,b)=>(b.leads+b.rdv*2+b.inscrits*8)-(a.leads+a.rdv*2+a.inscrits*8))}
function campaignChannelBreakdownHtml(item){const rows=campaignChannelSummary(item),max=Math.max(1,...rows.map(r=>r.leads+r.rdv*2+r.inscrits*8));return `<section class="channel-breakdown"><div class="between center"><div><div class="eyebrow">Lecture par plateforme</div><h3>Quel canal apporte quel signal ?</h3></div>${badge(rows.length+' canal'+(rows.length>1?'aux':''),'tone-blue')}</div>${rows.length?rows.map(r=>{const score=r.leads+r.rdv*2+r.inscrits*8,pct=Math.max(4,Math.round(score/max*100));return `<div class="channel-row"><span class="platform-chip ${avatarClass(r.channel)}">${channelIcon(r.channel)} ${esc(r.channel)}</span><div class="channel-copy"><small>${formatCompact(r.views)} vues · ${number(r.clicks)} clics · ${number(r.leads)} leads · ${number(r.rdv)} RDV · ${number(r.inscrits)} inscrit${r.inscrits>1?'s':''}</small><div class="signal-bar"><i style="width:${pct}%"></i></div></div></div>`}).join(''):'<div class="empty" style="margin-top:8px">Aucun signal par canal renseigné.</div>'}<p class="tiny" style="margin-top:7px">La longueur de barre synthétise les signaux utiles ; elle ne représente pas une probabilité de succès.</p></section>`}

function deleteCreatorProfile(id){if(!store.externalCreators[id])return;const linkedCampaigns=allCampaigns().filter(item=>campaignPeople(item).includes(id));const warn=linkedCampaigns.length?`\n\nAttention : ce profil est déjà accepté dans ${linkedCampaigns.length} campagne${linkedCampaigns.length>1?'s':''} (${linkedCampaigns.map(c=>c.title).join(', ')}). La suppression n’efface pas votre participation déjà enregistrée côté entreprise sur cet appareil-là, seulement vos données locales ici.`:'';if(!window.confirm('Supprimer votre profil, vos coordonnées et vos candidatures non transmises de cet appareil ? Cette action est irréversible.'+warn))return;let restCreators={...store.externalCreators};const linked=linkedCampaigns.length>0;if(linked){const oldProfile=store.externalCreators[id];restCreators[id]={id,name:'Profil supprimé — historique conservé',type:'Historique anonymisé',bio:'Les coordonnées ont été supprimées de cet appareil ; seul un repère non personnel est conservé pour ne pas casser les campagnes déjà acceptées.',country:oldProfile.country||'',city:'',languages:'',channel:oldProfile.channel||'UGC',platforms:'',followers:0,audience:oldProfile.audience||'',categories:'',formats:oldProfile.formats||'',priceIndicative:'',minMission:'',usageRights:'',travel:'',availability:'',references:'',localOffer:'',qrPlacement:'',contactEmail:'',contactPhone:'',consent:false,verified:false,createdAt:oldProfile.createdAt||new Date().toISOString(),deletedAt:new Date().toISOString()}}else{delete restCreators[id]}const nextApplications={...store.inboundApplications};for(const campaignId of Object.keys(nextApplications))nextApplications[campaignId]=(nextApplications[campaignId]||[]).filter(app=>!(app.personId===id&&app.status==='new'&&app.source==='self'));if(!commit('externalCreators',restCreators,linked?'Coordonnées supprimées, historique conservé':'Profil supprimé de cet appareil'))return;commit('inboundApplications',nextApplications,'');if(state.activeCreatorId===id){state. function campaignMeasuredSummary(item){const t=totals(item),spent=safeNumber(t.cost)||safeNumber(budgetNumber(item)),cpl=t.leads>0?spent/t.leads:null,cpd=t.dossiers>0?spent/t.dossiers:null;return{...t,spent,cpl,cpd}}
function pastCampaignRecapHtml(item){const t=campaignMeasuredSummary(item),proof=proofProgress(item),label=activeDataMode==='demo'?'Résultats fictifs calculés pour la démonstration':'Résultats issus des données saisies localement',costs=[t.cpl!==null?`Coût / lead : ${t.cpl.toFixed(2)} €`:'',t.cpd!==null?`Coût / dossier : ${t.cpd.toFixed(2)} €`:''].filter(Boolean);return `<section class="past-recap" data-campaign-phase="done"><div class="between center"><div><div class="eyebrow" style="color:var(--green)">${esc(label)}</div><h3>Récapitulatif mesuré</h3></div>${badge(proof.done+'/'+proof.total+' preuves','tone-green')}</div><div class="past-recap-grid"><div><b>${number(t.leads)}</b><span>leads</span></div><div><b>${number(t.rdv)}</b><span>RDV</span></div><div><b>${number(t.dossiers)}</b><span>dossiers</span></div><div><b>${number(t.inscrits)}</b><span>inscrits</span></div></div><p class="tiny measured-cost-line">Budget attribué / consommé : <b>${money(t.spent)}</b>${costs.length?' · '+costs.join(' · '):''}</p><p class="tiny" style="margin-top:5px">Ces valeurs sont dérivées des compteurs et suivis de l’app. Toute modification des données recalcule ce résumé.</p></section>`}
function campaignPrimarySignal(item){const t=totals(item);if(t.inscrits>0)return{value:t.inscrits,label:'inscrit'+(t.inscrits>1?'s':'')};if(t.dossiers>0)return{value:t.dossiers,label:'dossier'+(t.dossiers>1?'s':'')};if(t.rdv>0)return{value:t.rdv,label:'RDV'};if(t.leads>0)return{value:t.leads,label:'lead'+(t.leads>1?'s':'')};return{value:'—',label:'résultats à renseigner'}}
function campaignTopKpisHtml(item,ids,proof,t){if(categoryOf(item)==='prepare'){const p=campaignPreparationData(item);return `<div class="campaign-facts"><div><span>Profils ajoutés</span><b>${p.added}/${p.target}</b></div><div><span>Candidatures</span><b>${p.received}</b></div><div><span>Budget plafond</span><b>${money(budgetNumber(item))}</b></div></div>`}const signal=campaignPrimarySignal(item);return `<div class="campaign-facts"><div><span>Créateurs</span><b>${ids.length}</b></div><div><span>Preuves</span><b>${proof.done}/${proof.total}</b></div><div><span>Signal principal</span><b>${signal.value} ${esc(signal.label)}</b></div></div>`}

function campaignSearchMatch(item,query){const q=normalize(query);if(!q)return true;return normalize([item.title,item.objective,item.market,campaignMarket(item),item.audience,campaignAudience(item),effectiveStatus(item)].join(' ')).includes(q)}
function campaignSearchBox(){const value=state.campaignSearch||'';return `<section class="campaign-search" aria-label="Recherche de campagne"><div class="search-shell"><span class="loupe">🔍</span><input id="campaignSearchInput" value="${esc(value)}" placeholder="Rechercher campagne ou segment : MSc, JPO, Liban..." oninput="state.campaignSearch=this.value;render()">${value?`<button class="search-clear" aria-label="Effacer la recherche" onclick="state.campaignSearch='';render()">×</button>`:''}</div>${value?`<p class="tiny" style="margin-top:6px">Filtre actif : titre, objectif, marché, segment et statut.</p>`:''}</section>`}
function pendingProofRows(){const rows=[];allCampaigns().filter(item=>categoryOf(item)==='active').forEach(item=>campaignPeople(item).filter(id=>id!=='office').forEach(id=>{const ps=proofState(item.id,id);if(['missing','received'].includes(ps))rows.push({item,id,person:person(id),status:ps})}));return rows}
function quickProofHub(){const rows=pendingProofRows();if(!rows.length)return'';return `<section class="quick-proof-hub" aria-label="Preuves en attente"><div class="quick-proof-head"><h3>🚨 Preuves à traiter</h3><span class="badge tone-red">${rows.length}</span></div><div class="quick-proof-list">${rows.slice(0,6).map(r=>`<div class="quick-proof-row"><div class="copy"><b>${esc(r.person.name)}</b><small>${esc(r.item.title)} · ${proofLabel(r.status)}</small></div><div class="quick-proof-actions"><button class="approve" onclick="approveProofHub('${r.item.id}','${r.id}')">Valider</button><button class="reject" onclick="rejectProofHub('${r.item.id}','${r.id}')">À refaire</button></div></div>`).join('')}</div>${rows.length>6?`<p class="tiny" style="margin-top:7px">${rows.length-6} autres preuves à traiter dans les campagnes.</p>`:''}</section>`}
function approveProofHub(campaignId,personId){setProof(campaignId,personId,'validated');toast('Preuve validée — le paiement devient exigible selon accord')}
function rejectProofHub(campaignId,personId){setProof(campaignId,personId,'missing');toast('Preuve marquée à refaire / récupérer')}
function campaignPerformanceMetrics(item){const t=totals(item),budget=safeNumber(budgetNumber(item)),leads=safeNumber(t.leads),inscrits=safeNumber(t.inscrits);return{cpl:leads>0?budget/leads:null,conversion:leads>0?(inscrits/leads)*100:0}}
function getPerformanceMetricsHTML(item){const m=campaignPerformanceMetrics(item);return `<div class="roi-metrics-box"><div class="metric-card"><span class="metric-label">Coût / lead</span><span class="metric-value">${m.cpl===null?'--':m.cpl.toFixed(2)+' €'}</span></div><div class="metric-card"><span class="metric-label">Transfo.</span><span class="metric-value">${m.conversion.toFixed(1)} %</span></div></div>`}
function generateBriefText(item){const title=String(item?.title||'Mission Ruche × EBS').trim(),target=String(item?.audience||campaignAudience(item)||'étudiants potentiels').trim(),market=String(item?.market||campaignMarket(item)||'France').trim(),proof=String(item?.proofSignal||'preuve convenue : capture, lien de publication, fichier livré ou code cité par un candidat').trim(),budget=safeNumber(item?.budget);const reward=budget>0?`Le budget plafond de la mission est de ${budget} € au total, sous réserve de validation du profil, du livrable et de l’accord final.`:'La contrepartie ou rémunération est à confirmer avant toute publication.';const legal='Si la mission est rémunérée ou compensée, la mention de collaboration commerciale devra être claire dans le contenu.';return [`Hello,`, `On prépare une mission pilote Ruche × EBS : ${title}.`, `Cible prioritaire : ${target} · marché : ${market}.`, `Objectif : ${item?.objective||'relayer une action EBS avec un livrable simple et une preuve vérifiable.'}`, `Preuve attendue : ${proof}.`, reward, legal, `Rien n’est lancé automatiquement : si le fit est bon, Lucas valide manuellement le brief, les conditions et la date.`].filter(Boolean).join('\n\n')}
function copyBriefToClipboard(campaignId){const item=campaign(campaignId);if(!item){toast('Campagne introuvable');return}copyText(generateBriefText(item))}
function briefCopyPanel(item){return `<section class="brief-copy-panel"><div class="between center"><div><b style="font-size:12px">Brief copiable</b><p class="tiny" style="margin-top:3px">Message prêt pour email ou échange d’invitation. Aucun placeholder, aucun envoi automatique.</p></div>${badge('V90','tone-blue')}</div><button class="primary full" onclick="copyBriefToClipboard('${item.id}')">📋 Copier le brief personnalisé</button></section>`}

function demoGuidePanel(){if(activeDataMode!=='demo'||state.space!=='entreprise')return'';if(!state.demoGuideOpen)return'<button class="demo-guide-toggle" onclick="state.demoGuideOpen=true;render()">🎤 Guide de démo EBS · 6 étapes pour l’oral (≈ 5 min)</button>';const steps=[['1','<b>Portefeuille.</b> Montre les campagnes, les marchés et les quatre indicateurs opérationnels.'],['2','<b>Étapes.</b> Compare En cours, À venir et Passées : préparation, exécution puis résultats mesurés.'],['3','<b>Détail.</b> Ouvre une campagne et explique la chaîne Brief → Preuve → Paiement → Décision.'],['4','<b>Partenaire local.</b> Ouvre « Partenaires 13e » : un commerce peut proposer une vidéo, un QR ou un événement avec une preuve précise. Les profils affichés sont explicitement fictifs.'],['5','<b>Effet miroir.</b> Bascule côté Créateur, candidate à une mission et copie le récapitulatif.'],['6','<b>Boucle.</b> Reviens côté Entreprise : la candidature remonte, mais l’acceptation reste humaine.']];return'<section class="demo-guide"><div class="dg-head"><b>🎤 Guide de démo EBS</b><button class="text-button" onclick="state.demoGuideOpen=false;render()">Masquer</button></div><ol>'+steps.map(s=>'<li><span class="n">'+s[0]+'</span><span>'+s[1]+'</span></li>').join('')+'</ol><div class="dg-foot">Conclusion : « Ruche mesure ce qui peut l’être, sans ROI garanti, sans paiement automatique et sans présenter un exemple fictif comme un partenariat réel. »</div></section>'} function campaignsView(){if(state.wizard)return wizardView();if(state.campaignId)return campaignDetail(campaign(state.campaignId));const searchable=allCampaigns().filter(item=>campaignSearchMatch(item,state.campaignSearch||'')),lists={active:searchable.filter(x=>categoryOf(x)==='active'),prepare:searchable.filter(x=>categoryOf(x)==='prepare'),done:searchable.filter(x=>categoryOf(x)==='done')},counts=actionCounts(),todo=counts.proof+counts.payment+counts.decision,base=state.category==='all'?searchable:(lists[state.category]||searchable),list=state.actionFilter?base.filter(item=>campaignHasAction(item,state.actionFilter)):base,emptyMsg=({active:'Aucune campagne en cours.',prepare:'Aucune campagne \u00e0 venir pour l\u2019instant.',done:'Aucune campagne pass\u00e9e.',all:'Aucune campagne ne correspond \u00e0 ce filtre.'})[state.category]||'Aucune campagne ne correspond \u00e0 ce filtre.';return `${demoGuidePanel()}${mirrorNoticeHtml()}${campaignOverviewDemoStrip()}<div class="page-heading"><div><div class="eyebrow">Ruche</div><h1>Mes campagnes</h1><p class="subtitle">Suis chaque campagne par \u00e9tape : en cours, \u00e0 venir, pass\u00e9es.</p></div><button class="primary" onclick="openWizard()">+ Nouvelle campagne</button></div>${homeKpiSummary()}<div class="segments four">${[['active','En cours'],['prepare','\u00c0 venir'],['done','Pass\u00e9es'],['all','Toutes']].map(([key,label])=>`<button class="${state.category===key?'active':''}" onclick="setCategory('${key}')">${label} \u00b7 ${key==='all'?searchable.length:lists[key].length}</button>`).join('')}</div>${campaignSearchBox()}${state.actionFilter?`<div class="action-filter-note"><span>Filtre actif : ${esc(({proof:'preuves \u00e0 traiter',payment:'paiements \u00e0 valider',decision:'d\u00e9cisions',inbound:'candidatures \u00e0 examiner'})[state.actionFilter]||state.actionFilter)}</span><button class="text-button" onclick="setActionFilter('')">Effacer</button></div>`:''}${list.length?list.map(campaignCard).join(''):`<div class="empty">${emptyMsg}</div>`}<details class="idea-library" style="margin-top:14px"><summary><span>\u2691 \u00c0 traiter${todo?' \u00b7 '+todo+' action'+(todo>1?'s':''):''}</span><span class="badge ${todo?'tone-red':'tone-green'}">${todo||'0'}</span></summary><div style="margin-top:10px"><div class="action-summary" aria-label="Actions \u00e0 traiter"><button class="action-card ${state.actionFilter==='proof'?'active':''}" onclick="setActionFilter('proof')"><b>${counts.proof}</b><span>\ud83d\udcf8 preuves \u00e0 traiter</span></button><button class="action-card ${state.actionFilter==='payment'?'active':''}" onclick="setActionFilter('payment')"><b>${counts.payment}</b><span>\ud83d\udcb6 paiements</span></button><button class="action-card ${state.actionFilter==='decision'?'active':''}" onclick="setActionFilter('decision')"><b>${counts.decision}</b><span>\u2696 d\u00e9cisions</span></button></div>${quickProofHub()}</div></details>${ideaLibraryHtml()}`}
function campaignLifecycleData(item){const ids=campaignPeople(item).filter(id=>id!=='office'),category=categoryOf(item),proofs=ids.map(id=>proofState(item.id,id)),payments=ids.map(id=>paymentState(item.id,id)),hasExplicitProof=ids.some(id=>Object.prototype.hasOwnProperty.call(store.proofStates,proofKey(item.id,id))||proofState(item.id,id)!=='missing');if(category==='prepare')return{index:ids.length?1:0,key:ids.length?'selection':'brief'};if(!ids.length)return{index:0,key:'brief'};if(payments.some(value=>value==='due'||value==='litige'))return{index:4,key:'payment'};if(category==='done')return{index:5,key:'decision'};if(!hasExplicitProof)return{index:2,key:'creation'};if(proofs.some(value=>value!=='validated'))return{index:3,key:'proof'};if(payments.every(value=>['paid','internal','none'].includes(value)))return{index:5,key:'decision'};return{index:4,key:'payment'}}
function campaignProgressHtml(item){const current=campaignLifecycleData(item),steps=[['Brief','brief'],['Sélection','selection'],['Création','creation'],['Preuve','proof'],['Paiement','payment'],['Décision','decision']];return `<div class="campaign-lifecycle" aria-label="Progression de campagne : étape ${esc(steps[current.index][0])}">${steps.map(([label,key],index)=>`<div class="lifecycle-step ${index<current.index?'complete':index===current.index?'current':''}"><span>${index<current.index?'✓':index+1}</span><b>${label}</b></div>`).join('')}</div>`}
function defaultCampaignSection(item){const inbound=inboundCounts(item.id),ids=campaignPeople(item).filter(id=>id!=='office');if(inbound.new>0||categoryOf(item)==='prepare')return'team';if(categoryOf(item)==='done')return'results';if(ids.some(id=>['due','litige'].includes(paymentState(item.id,id)))||ids.some(id=>['missing','received'].includes(proofState(item.id,id))))return'proofs';return''}
function campaignSectionOpen(item,key){return(state.campaignSection||defaultCampaignSection(item))===key}
function handleCampaignAccordion(event,key){const current=event.currentTarget;if(current.open){state.campaignSection=key;document.querySelectorAll('details[data-campaign-section]').forEach(node=>{if(node!==current)node.open=false});setTimeout(()=>current.scrollIntoView({behavior:window.matchMedia('(prefers-reduced-motion: reduce)').matches?'auto':'smooth',block:'nearest'}),20)}else if(state.campaignSection===key)state.campaignSection=null;const summary=current.querySelector('summary');if(summary)summary.setAttribute('aria-expanded',String(current.open))}
function openCampaignSection(key){state.campaignSection=key;render();requestAnimationFrame(()=>document.querySelector(`details[data-campaign-section="${key}"]`)?.scrollIntoView({behavior:window.matchMedia('(prefers-reduced-motion: reduce)').matches?'auto':'smooth',block:'start'}))}
function campaignCardShell(item,kind,body){const status=effectiveStatus(item),inbound=inboundCounts(item.id),mirror=state.mirrorFlash?.campaignId===item.id&&inbound.new>0;return `<article class="campaign-card campaign-card-${kind} ${mirror?'mirror-pulse':''}" data-card-kind="${kind}"><div class="campaign-title"><div><div class="eyebrow">${esc(campaignMarket(item))}</div><h3>${item.emoji||'▣'} ${esc(item.title)}</h3></div>${badge(status,statusTone(status))}</div>${campaignPlatformPills(item)}${body}<button class="primary full" onclick="openCampaign('${item.id}')">Ouvrir la campagne</button></article>`}
function campaignCardActive(item){const ids=campaignPeople(item).filter(id=>id!=='office'),proof=proofProgress(item),signal=campaignPrimarySignal(item),inbound=inboundCounts(item.id),mirror=state.mirrorFlash?.campaignId===item.id&&inbound.new>0;return campaignCardShell(item,'active',`<div class="card-signal-grid"><div><span>Créateurs</span><b>${ids.length}</b></div><div><span>Preuves</span><b>${proof.done}/${proof.total}</b></div><div><span>${esc(signal.label)}</span><b>${signal.value}</b></div></div>${inbound.total?`<div class="candidate-inline ${mirror?'mirror-chip':''}">${inbound.new?`+${inbound.new} candidature${inbound.new>1?'s':''} à examiner`:`${inbound.total} candidature${inbound.total>1?'s':''}`}</div>`:''}<div class="next-action"><b>Prochaine action</b><span>${esc(priorityActions(item)[0]||item.next||'Poursuivre la campagne')}</span></div>`)}
function campaignCardPrepare(item){const inbound=inboundCounts(item.id);return campaignCardShell(item,'prepare',`${campaignPreparationHtml(item,true)}${inbound.new?`<div class="candidate-inline mirror-chip">+${inbound.new} candidature${inbound.new>1?'s':''} à examiner</div>`:''}<div class="next-action"><b>Prochaine étape</b><span>${esc(item.next||'Finaliser la sélection et le brief')}</span></div>`)}
function campaignCardDone(item){return campaignCardShell(item,'done',pastCampaignRecapHtml(item))}
function campaignCard(item){const category=categoryOf(item);if(category==='prepare')return campaignCardPrepare(item);if(category==='done')return campaignCardDone(item);return campaignCardActive(item)}

function buildRunbook(item,format='standard'){if(format==='whatsapp')return buildWhatsAppRunbook(item);if(format==='notion')return buildNotionRunbook(item);const ids=campaignPeople(item).filter(id=>id!=='office');const codeSlug=(item.id||'').replace(/[^a-z0-9]/gi,'').slice(0,8).toUpperCase();const L=[];L.push('PLAN D\'ACTION ADMISSIONS — '+(item.title||''));L.push('Campagne : '+(item.emoji||'')+' '+(item.title||'')+' · Marché : '+campaignMarket(item)+' · Statut : '+effectiveStatus(item));L.push('Objectif : '+(item.objective||'—'));L.push('');L.push('RAPPEL DOCTRINE : paiement dû dès preuve livrée. Le code sert à décider qui rejouer, jamais à retenir un paiement. Aucun ROI promis.');L.push('');L.push('1. CRÉATEURS & RELAIS À COORDONNER ('+ids.length+')');if(!ids.length)L.push('   (aucun créateur validé pour l\'instant)');ids.forEach((id,i)=>{const c=person(id);const st=proofState(item.id,id);const stTxt=st==='validated'?'preuve OK':st==='missing'?'PREUVE À RÉCUPÉRER':'en attente';L.push('   '+(i+1)+'. '+c.name+' — '+c.channel+' · '+marketOf(c)+(followersOf(c)?' · '+followerLabel(c):'')+' · '+(c.price||'')+'  ['+stTxt+']');L.push('      Livrable : '+(c.deliverables||'à cadrer')+' | Preuve attendue : '+(c.proof||'lien + capture + mention'));L.push('      Contact : '+(c.owner?('via '+c.owner):'à qualifier')+' — aucun numéro stocké par Ruche, à récupérer manuellement.');});L.push('');L.push('2. SUIVI & ATTRIBUTION (saisie manuelle Office Admission)');L.push('   - Code oral/visible à noter dans chaque dossier candidat : EBS-'+codeSlug);const trackLink=trackingLinkFor(item);if(trackLink)L.push('   - Lien de suivi à publier : '+trackLink);L.push('   - À chaque candidat : demander « Comment avez-vous connu EBS ? », noter le code s\'il est cité spontanément, vérifier les doublons.');L.push('');L.push('3. TÂCHES TERRAIN CETTE SEMAINE');const acts=priorityActions(item);(acts.length?acts:['Envoyer les briefs','Fixer les dates de publication','Poser le code de suivi']).forEach((a,i)=>L.push('   ['+(i+1)+'] '+a));L.push('');L.push('4. DÉCISION À J+2');L.push('   Croiser les preuves reçues avec les inscriptions réelles. Rebooker les profils qui convertissent, ne pas rejouer les autres. Payer tout travail livré et prouvé.');L.push('');L.push('Généré par Ruche — état local, à exécuter manuellement. Rien n\'est publié automatiquement.');return L.join('\n')}

function buildWhatsAppRunbook(item){
  const ids=campaignPeople(item).filter(id=>id!=='office');
  const codeSlug=(item.id||'').replace(/[^a-z0-9]/gi,'').slice(0,8).toUpperCase();
  const lines=[];
  lines.push(`*📋 RUNBOOK ADMISSIONS — ${item.title.toUpperCase()}*`);
  lines.push(`_Coordination interne · ${new Date().toLocaleDateString('fr-FR')}_`);
  lines.push('');
  lines.push('*⚠️ DOCTRINE GUICHET*');
  lines.push('Preuve conforme livrée = paiement dû.');
  lines.push('Le code sert à mesurer et décider le rebooking, jamais à retenir un paiement.');
  lines.push('Aucun ROI promis.');
  lines.push('');
  lines.push('*1. ATTRIBUTION*');
  lines.push(`- Code à noter : *EBS-${codeSlug}*`);
  if(trackingLinkFor(item))lines.push(`- Lien de suivi : ${trackingLinkFor(item)}`);
  lines.push(`- Marché : ${campaignMarket(item)}`);
  lines.push('');
  lines.push(`*2. CRÉATEURS / RELAIS (${ids.length})*`);
  if(!ids.length)lines.push('_Aucun créateur validé pour l’instant._');
  ids.forEach((id,index)=>{
    const c=person(id),st=proofState(item.id,id),label=st==='validated'?'✅ preuve OK':st==='received'?'🟠 preuve reçue':'⏳ preuve à récupérer';
    lines.push(`- *${index+1}. ${c.name}* — ${c.channel} · ${marketOf(c)} · ${c.price}`);
    lines.push(`  ${label}`);
    lines.push(`  Livrable : ${c.deliverables||'à cadrer'}`);
    lines.push(`  Preuve : ${c.proof||'lien + capture'}`);
    lines.push('');
  });
  lines.push('*3. SCRIPT OFFICE ADMISSION*');
  lines.push('Question à poser spontanément :');
  lines.push('_« Comment avez-vous connu EBS ? »_');
  lines.push('');
  lines.push(`Si le candidat cite le code *EBS-${codeSlug}* ou un créateur :`);
  lines.push('1. Noter le code dans le dossier.');
  lines.push('2. Noter le relais cité spontanément.');
  lines.push('3. Vérifier les doublons.');
  lines.push('4. Ne jamais souffler la réponse.');
  lines.push('');
  lines.push('*4. DÉCISION J+2 / J+7*');
  lines.push('- Payer les preuves conformes.');
  lines.push('- Rebooker seulement les profils avec signaux utiles.');
  lines.push('- Couper les profils sans signal utile, sans bloquer le paiement dû.');
  return lines.join('\n\n');
}
function buildNotionRunbook(item){
  const ids=campaignPeople(item).filter(id=>id!=='office');
  const codeSlug=(item.id||'').replace(/[^a-z0-9]/gi,'').slice(0,8).toUpperCase();
  const lines=[];
  lines.push(`# Runbook Admissions — ${item.title}`);
  lines.push(`**Marché :** ${campaignMarket(item)}  `);
  lines.push(`**Statut :** ${effectiveStatus(item)}  `);
  lines.push(`**Code :** EBS-${codeSlug}`);
  lines.push('');
  lines.push('## Doctrine');
  lines.push('- [ ] Preuve conforme reçue = paiement dû.');
  lines.push('- [ ] Aucun ROI promis.');
  lines.push('- [ ] Validation finale par Office Admission.');
  lines.push('');
  lines.push('## Créateurs / relais');
  if(!ids.length)lines.push('- Aucun créateur validé.');
  ids.forEach(id=>{
    const c=person(id),st=proofState(item.id,id);
    lines.push(`- [ ] **${c.name}** — ${c.channel} / ${marketOf(c)} / ${c.price}`);
    lines.push(`  - Livrable : ${c.deliverables||'à cadrer'}`);
    lines.push(`  - Preuve : ${c.proof||'lien + capture'}`);
    lines.push(`  - Statut preuve : ${proofLabel(st)}`);
  });
  lines.push('');
  lines.push('## Questions guichet');
  lines.push('- [ ] Demander : « Comment avez-vous connu EBS ? »');
  lines.push('- [ ] Noter uniquement les codes cités spontanément.');
  lines.push('- [ ] Contrôler les doublons.');
  return lines.join('\n');
}

function confirmWizard(){const w=state.wizard;if(w.mode==='add'){const existing=Array.isArray(store.additions[w.targetId])?store.additions[w.targetId]:[],next={...store.additions,[w.targetId]:[...new Set(existing.concat(w.selected))]};if(!commit('additions',next))return;const target=w.targetId;state.wizard=null;state.campaignId=target;render();toast('Créateur ajouté');return}const id='custom-'+Date.now()+'-'+Math.random().toString(36).slice(2,7),newCampaign={id,emoji:'✨',title:w.draft.title.trim(),status:'Brouillon',market:w.draft.market,objective:w.draft.objective.trim(),budget:estimateBudget(w.selected),people:[...w.selected,'office'],decision:'Campagne créée. Aucun profil n’est activé avant validation du brief, du prix et de la preuve.',next:'Valider le brief, confirmer les prix et envoyer les premiers messages.',method:'Créée dans Ruche V88 à partir d’un mix créateurs expliqué : rôle, preuve, budget, risque et complémentarité.'},next=store.customCampaigns.concat(newCampaign);if(!commit('customCampaigns',next))return;state.wizard=null;state.category='prepare';state.campaignId=id;render();toast('Campagne créée')}
function firstNumber(value){const match=String(value||'').match(/\d+(?:[.,]\d+)?/);return match?safeNumber(match[0]):0}
function estimatePerson(p){const txt=normalize(p.price),n=firstNumber(p.price);if(/interne/.test(txt))return 0;if(/\/ lead/.test(txt))return n*10;if(/\/ dossier/.test(txt))return n*2;if(/\/ present/.test(txt))return n*5;if(/selon accord|0–50|0-50/.test(txt))return 50;if(/\+/.test(p.price)&&!(/stories \+ reel|reel \+ stories/.test(txt))){const nums=String(p.price).match(/\d+/g)||[];return nums.reduce((a,b)=>a+safeNumber(b),0)}return n}
function estimateBudget(ids){return (Array.isArray(ids)?ids:[]).reduce((sum,id)=>sum+safeNumber(estimatePerson(person(id))),0)}
function scoreCreator(p,query){const q=normalize(query),blob=normalize(JSON.stringify(p));let score=25;const market=queryMarket(q),aud=queryAudience(q),channel=queryChannel(q),budget=queryBudget(q);if(market&&marketOf(p)===market)score+=40;if(aud&&audienceOf(p)===aud)score+=24;if(channel&&p.channel===channel)score+=18;if(q.split(/\s+/).filter(x=>x.length>3).some(word=>blob.includes(word)))score+=10;if(['Travaillé','Parlé'].includes(p.status))score+=5;if(budget&&estimatePerson(p)>budget)score-=22;return Math.max(0,Math.min(99,score))}
function queryMarket(q){for(const [market,re] of [['Maroc',/maroc|casablanca/],['Liban',/liban|beyrouth/],['Italie',/italie|milan|rome/],['Espagne',/espagne|barcelone|madrid/],['Népal',/nepal|kathmandu/],['Inde',/inde|mumbai/],['Vietnam',/vietnam|saigon/],["Côte d’Ivoire",/ivoire|abidjan/],['Canada',/canada|montreal/],['USA',/usa|new york|nyc/],['Dubai',/dubai/],['France',/france|paris|parcoursup/]])if(re.test(q))return market;return''}
function queryAudience(q){if(/lyce|terminale|parcoursup|bachelor/.test(q))return'lycéens';if(/parent|famille/.test(q))return'parents';if(/alumni|ancien/.test(q))return'alumni';if(/etudiant|msc|master/.test(q))return'étudiants';return''}
function queryChannel(q){if(/tiktok/.test(q))return'TikTok';if(/instagram|reel|story/.test(q))return'Instagram';if(/linkedin/.test(q))return'LinkedIn';if(/whatsapp/.test(q))return'WhatsApp';if(/ugc|video/.test(q))return'UGC';if(/terrain|jpo|portes ouvertes/.test(q))return'Terrain';return''}
function queryBudget(q){const match=q.match(/(?:budget|moins de|max|sous)\s*(?:de)?\s*(\d{2,7})/);return match?safeNumber(match[1]):/petit budget|economique/.test(q)?80:0}
function fitInfo(score){return score>=85?{label:'Très adapté',cls:'fit-strong',key:'excellent'}:score>=65?{label:'Adapté',cls:'fit-good',key:'good'}:score>=45?{label:'À vérifier',cls:'fit-check',key:'partial'}:{label:'Peu adapté',cls:'fit-low',key:'weak'}}
function campaignAudience(item){const text=normalize((item?.title||'')+' '+(item?.objective||''));if(/parent|famille/.test(text))return'parents';if(/alumni|ancien/.test(text))return'alumni';if(/msc|master|alternance|etudiant|international/.test(text))return'étudiants';return'lycéens'}
function creatorHistory(personId){if(activeDataMode!=='demo')return{activations:0,clicks:0,rdv:0,dossiers:0,inscrits:0};let activations=0,clicks=0,rdv=0,dossiers=0,inscrits=0;for(const rows of Object.values(PERF)){const row=rows?.[personId];if(!row)continue;activations++;clicks+=safeNumber(row.clicks);rdv+=safeNumber(row.rdv);dossiers+=safeNumber(row.dossiers);inscrits+=safeNumber(row.inscrits)}return{activations,clicks,rdv,dossiers,inscrits}}
function matchingContext(targetId=''){if(targetId)return campaign(targetId);if(state.wizard?.draft)return state.wizard.draft;return null}
function creatorDiagnosis(p,context=null,query=''){const q=normalize(query),hasContext=!!(context&&(context.title||context.objective||context.market)),history=creatorHistory(p.id),reasons=[],warnings=[];let score=q?Math.round(scoreCreator(p,query)*.55):32;const targetMarket=hasContext?(context.market||campaignMarket(context)):queryMarket(q),targetAudience=hasContext?(context.audience||campaignAudience(context)):queryAudience(q),desiredChannel=queryChannel(q||normalize(context?.objective||'')),budget=hasContext?safeNumber(context.budget):queryBudget(q);if(targetMarket){if(marketOf(p)===targetMarket){score+=30;reasons.push('Marché exact')}else{score-=12;warnings.push('Marché différent')}}if(targetAudience){if(audienceOf(p)===targetAudience){score+=24;reasons.push('Audience exacte')}else{score-=14;warnings.push('Audience à vérifier')}}if(desiredChannel){if(p.channel===desiredChannel){score+=13;reasons.push('Canal demandé')}else warnings.push('Canal différent')}if(history.inscrits>0){score+=16;reasons.push(history.inscrits+' inscription'+(history.inscrits>1?'s':''))}else if(history.dossiers>0){score+=11;reasons.push(history.dossiers+' dossier'+(history.dossiers>1?'s':''))}else if(history.rdv>0){score+=7;reasons.push(history.rdv+' RDV historique'+(history.rdv>1?'s':''))}if(history.activations>0&&!reasons.some(x=>/inscription|dossier|RDV/.test(x))){score+=4;reasons.push('Déjà activé')}const price=estimatePerson(p);if(budget){const allowance=Math.max(50,budget/Math.max(1,state.wizard?.selected?.length||3));if(price<=allowance){score+=7;reasons.push('Budget compatible')}else{score-=15;warnings.push('Budget à confirmer')}}if(/inconnu|marche neuf|aucun historique|prix plus eleve/.test(normalize(p.risk))){score-=5;warnings.push('Risque à cadrer')}if(['Travaillé','Parlé'].includes(p.status))score+=4;score=Math.max(0,Math.min(99,Math.round(score)));return{score,fit:fitInfo(score),reasons:[...new Set(reasons)].slice(0,3),warnings:[...new Set(warnings)].slice(0,2),history}}
function matchReasonHtml(diag){const positive=diag.reasons.map(reason=>`<span class="reason-chip positive">${esc(reason)}</span>`).join(''),warning=diag.warnings.map(reason=>`<span class="reason-chip warning">${esc(reason)}</span>`).join('');return `<div class="match-reasons">${positive||'<span class="reason-chip">À qualifier</span>'}${warning}</div>`}

function defaultScoutQueryForContext(context){const market=context?.market||campaignMarket(context||{}),aud=campaignAudience(context||{}),objective=context?.objective||'';return [market,aud,objective].filter(Boolean).join(' ').trim()}
function creatorReferenceText(p,history=creatorHistory(p.id)){const parts=[];const followers=followerLabel(p);if(followers&&followers!=='Sans audience propre')parts.push(followers);else parts.push(p.channel==='WhatsApp'||p.channel==='Terrain'||p.channel==='UGC'?'Réseau ou actif sans audience publique':'Audience publique à qualifier');if(history.activations)parts.push(history.activations+' activation'+(history.activations>1?'s':'')+' Ruche');else parts.push('Aucune campagne Ruche liée');if(history.inscrits)parts.push(history.inscrits+' inscrit'+(history.inscrits>1?'s':''));else if(history.dossiers)parts.push(history.dossiers+' dossier'+(history.dossiers>1?'s':''));else if(history.rdv)parts.push(history.rdv+' RDV');if(p.channel==='TikTok')parts.push(history.rdv||history.dossiers?'Référence TikTok avec signal':'TikTok à tester avec capture stats');if(p.channel==='LinkedIn')parts.push('Crédibilité / rassurance');if(p.channel==='UGC')parts.push('Actif réutilisable');if(p.channel==='WhatsApp')parts.push('Dark social à tracer');return parts.slice(0,4).join(' · ')}
function creatorMixRole(p,context=null,query=''){const channel=p.channel,history=creatorHistory(p.id),aud=audienceOf(p),market=context?(context.market||campaignMarket(context)):queryMarket(normalize(query||''));let title='Profil à qualifier',value='Complément possible si le prix, la preuve et le calendrier sont validés.',proofLevel='Preuve à cadrer';if(channel==='TikTok'){title='Attention vidéo';value='Capte l’attention en haut de funnel et donne un volume de vues traçable par lien/code.';proofLevel='Preuve stats vidéo'}else if(channel==='Instagram'){title='Preuve sociale visuelle';value='Montre le campus, le quotidien ou le marché local avec un format facile à repartager.';proofLevel='Preuve stories/reel'}else if(channel==='LinkedIn'){title=/alumni/i.test(p.name+p.kind)?'Crédibilité alumni':'Crédibilité carrière';value='Rassure les parents et candidats par un signal plus sérieux que le simple reach social.';proofLevel='URL post public'}else if(channel==='WhatsApp'){title='Relais local / dark social';value='Active un réseau fermé où les clics sont faibles mais les codes et questions admissions font foi.';proofLevel='Code + confirmation admissions'}else if(channel==='UGC'){title='Actif réutilisable';value='Produit une vidéo ou un témoignage réutilisable en email, landing ou relance candidat.';proofLevel='Fichier + droits'}else if(channel==='Terrain'){title='Closing terrain';value='Transforme l’intérêt en présence, échange parent/candidat ou RDV lors d’un événement.';proofLevel='Check-in / présence'}if(market&&marketOf(p)===market)value+=' Marché aligné.';if(history.rdv||history.dossiers||history.inscrits)value+=' Historique Ruche existant.';if(aud==='parents')value+=' Utile pour rassurer les familles.';return{title,value,proofLevel}}
function creatorWhyText(p,context=null,query=''){const q=normalize(query||''),targetMarket=context?(context.market||campaignMarket(context)):queryMarket(q),targetAudience=context?(context.audience||campaignAudience(context)):queryAudience(q),desiredChannel=queryChannel(q||normalize(context?.objective||'')),history=creatorHistory(p.id),role=creatorMixRole(p,context,query),reasons=[];if(targetMarket&&marketOf(p)===targetMarket)reasons.push('marché '+targetMarket+' exact');else if(targetMarket)reasons.push('marché différent à vérifier');if(targetAudience&&audienceOf(p)===targetAudience)reasons.push('audience '+targetAudience+' alignée');else if(targetAudience)reasons.push('audience à vérifier');if(desiredChannel&&p.channel===desiredChannel)reasons.push('canal demandé');if(estimatePerson(p)<=80)reasons.push('budget léger');if(history.rdv||history.dossiers||history.inscrits)reasons.push('historique Ruche exploitable');if(!reasons.length)reasons.push('profil proche de la recherche, à qualifier manuellement');return `${p.name} remonte car ${reasons.join(', ')}. Rôle proposé : ${role.title}. Ce qu’il apporte : ${role.value} Risque principal : ${p.risk||'à cadrer avant contact'}.`}
function creatorReferencePills(p,diag){const history=diag?.history||creatorHistory(p.id),role=creatorMixRole(p);return `<div class="reference-line">${pill(followerLabel(p))}${pill(history.activations?history.activations+' activ. Ruche':'0 historique Ruche')}${pill(role.title)}${pill(marketOf(p))}</div>`}
function recommendedMixFromList(list,context,query,max=3){const sorted=list.slice().sort((a,b)=>creatorDiagnosis(b,context,query).score-creatorDiagnosis(a,context,query).score),chosen=[],add=p=>{if(p&&!chosen.some(x=>x.id===p.id)&&chosen.length<max)chosen.push(p)};const market=context?(context.market||campaignMarket(context)):queryMarket(normalize(query||''));add(sorted.find(p=>marketOf(p)===market));add(sorted.find(p=>['WhatsApp','Terrain'].includes(p.channel)));add(sorted.find(p=>['TikTok','Instagram'].includes(p.channel)));add(sorted.find(p=>p.channel==='LinkedIn'));add(sorted.find(p=>p.channel==='UGC'));sorted.forEach(add);return chosen.slice(0,max)}
function selectRecommendedWizardMix(){const w=state.wizard;if(!w)return;const list=filteredCreators(w.query,w.filters,w.targetId),context=w.targetId?campaign(w.targetId):w.draft,max=w.mode==='add'?1:3;w.selected=recommendedMixFromList(list,context,w.query,max).map(p=>p.id);w.listWindow=LIST_STEP;render();toast('Mix recommandé sélectionné')}

function portfolioMixPanel(people,context=null,query='',title='Plan de campagne'){const s=portfolioSummary(people,context,query);return `<div class="plan-panel"><div class="between center"><div><h3>${esc(title)}</h3><p>${s.count?`Mix proposé : ${esc(s.roles.join(' + '))}. Budget indicatif à valider avant contact.`:'Aucun profil sélectionné.'}</p></div>${badge('Plan','tone-blue')}</div><div class="plan-kpis"><div><b>${s.count}</b><span>profils</span></div><div><b>${money(s.budget)}</b><span>budget</span></div><div><b>${s.avgScore}/99</b><span>indice moyen</span></div><div><b>${s.channels.length}</b><span>canaux</span></div></div>${s.count?`<div class="role-strip">${s.roles.map(r=>`<span class="role-chip ok">${esc(r)}</span>`).join('')}${s.gaps.slice(0,2).map(g=>`<span class="role-chip warn">manque ${esc(g)}</span>`).join('')}</div>${mixChainHtml([...new Set(s.roles.map(mixChainStage))])}`:''}${s.riskCount?`<div class="campaign-mix-warning"><b>${s.riskCount} risque${s.riskCount>1?'s':''} à cadrer :</b> valider preuve, prix, calendrier et droits avant activation.</div>`:''}</div>`}

function stableHash(value){let h=0;String(value||'').split('').forEach(ch=>{h=((h<<5)-h)+ch.charCodeAt(0);h|=0});return Math.abs(h)}
function geoForCreator(p){const key=String(p.id||'').split('-')[0],specific=PROFILE_GEO[p.id]||PROFILE_GEO[key],fallback=MARKET_GEO[marketOf(p)]||MARKET_GEO.France,base=specific||fallback,maxTravel=(p.channel==='Terrain'?45:p.channel==='WhatsApp'?20:p.channel==='LinkedIn'?0:35);return{home_base:{city:base.city,lat:base.lat,lng:base.lng,max_travel_time_mins:maxTravel},influence_bassin:{type:'FeatureCollection',features:[{type:'Feature',properties:{density:.7},geometry:{type:'Point',coordinates:[base.lng,base.lat]}},{type:'Feature',properties:{density:.3},geometry:{type:'Point',coordinates:[base.lng+.6,base.lat+.35]}}]}}}

function distanceKm(a,b){const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180,la1=a.lat*Math.PI/180,la2=b.lat*Math.PI/180,x=Math.sin(dLat/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;return 2*R*Math.asin(Math.sqrt(x))}

function filterControls(filters,open,wizard=false){const markets=['Tous','France','Maroc','Liban','Italie','Espagne','Népal','Inde','Vietnam',"Côte d’Ivoire",'Canada','USA','Dubai'],audiences=['Toutes','lycéens','parents','étudiants','alumni'],channels=['Tous','TikTok','Instagram','LinkedIn','WhatsApp','Terrain','UGC'],budgets=['Tous','< 50€','50–150€','150€+','Interne / accord'],active=Object.values(filters).filter(v=>!['Tous','Toutes'].includes(v)).length,toggle=wizard?'state.wizard.filtersOpen=!state.wizard.filtersOpen':'state.filtersOpen=!state.filtersOpen',drawerId=wizard?'wizardFilterDrawer':'profileFilterDrawer';return `<div class="profile-filter-strip"><button class="secondary filter-button" aria-expanded="${open}" aria-controls="${drawerId}" onclick="${toggle};render()">Filtres structurés${active?' · '+active:''}</button>${!wizard?`<span class="profile-list-badge">Créateurs uniquement</span>`:''}</div><section class="filter-drawer" id="${drawerId}" ${open?'':'hidden'} aria-label="Filtres créateurs"><div class="filter-grid">${selectFilter('Marché','market',markets,filters,wizard)}${selectFilter('Audience','audience',audiences,filters,wizard)}${selectFilter('Canal','channel',channels,filters,wizard)}${selectFilter('Budget','budget',budgets,filters,wizard)}</div></section>`}

function effectiveVisibility(item){const override=store.missionVisibility[item.id];if(['privee','invitation','ouverte'].includes(override))return override;if(item.visibility&&['privee','invitation','ouverte'].includes(item.visibility))return item.visibility;if(activeDataMode==='demo'&&item.id==='jpo-1107')return'ouverte';if(activeDataMode==='pilote'&&item.id==='pilot-jpo-ebs-2026')return'ouverte';return'invitation'}
function setMissionVisibility(campaignId,value){if(!['privee','invitation','ouverte'].includes(value))return;const next={...store.missionVisibility,[campaignId]:value};if(commit('missionVisibility',next,'Visibilité de la mission mise à jour'))render()}
function visibilityLabel(v){return v==='ouverte'?'Ouverte aux candidatures':v==='invitation'?'Sur invitation':'Privée'}
function openMissions(){return allCampaigns().filter(item=>effectiveVisibility(item)==='ouverte')}
function creatorStats(personId){let missions=0,proofsAssigned=0,proofsValidated=0,reactivations=0;for(const c of allCampaigns()){if(!campaignPeople(c).includes(personId))continue;missions++;const ps=proofState(c.id,personId);if(ps!=='missing')proofsAssigned++;if(ps==='validated')proofsValidated++;if(decisionState(c.id,personId)==='rebook')reactivations++}return{missions,proofsAssigned,proofsValidated,proofRate:proofsAssigned?proofsValidated/proofsAssigned:0,reactivations}}
function reputationBadges(personId){const s=creatorStats(personId),badges=[],ext=isExtId(personId)?store.externalCreators[personId]:null;if(ext?.verified)badges.push({key:'verifie',label:'Profil vérifié',tone:'tone-blue'});if(s.missions===0){if(!badges.length)badges.push({key:'nouveau',label:'Nouveau',tone:'tone-neutral'});return badges}if(s.proofRate>=.8)badges.push({key:'fiable',label:'Fiable',tone:'tone-green'});if(s.missions>=3&&s.proofRate>=.8)badges.push({key:'regulier',label:'Régulier',tone:'tone-blue'});if(s.missions>=3&&s.proofRate>=.9&&s.reactivations>=1)badges.push({key:'prioritaire',label:'Prioritaire',tone:'tone-violet'});if(!badges.length)badges.push({key:'nouveau',label:'Nouveau',tone:'tone-neutral'});return badges}
function compatibilityFactors(p,context=null,query=''){const diag=creatorDiagnosis(p,context,query),has=t=>diag.reasons.some(r=>r.includes(t)),warn=t=>diag.warnings.some(w=>w.includes(t)),market=context?(context.market||campaignMarket(context)):'',stats=creatorStats(p.id);return[
{label:'Adéquation cible',status:diag.score>=65?'ok':diag.score>=45?'warn':'low',detail:diag.fit.label},
{label:'Marché',status:has('Marché')?'ok':warn('Marché')?'warn':'unknown',detail:marketOf(p)+(market?' (visé : '+market+')':'')},
{label:'Langue',status:p.languages?'ok':'unknown',detail:p.languages||'Non renseignée'},
{label:'Territoire',status:p.city||has('Marché')?'ok':'unknown',detail:p.city||marketOf(p)},
{label:'Canal',status:has('Canal')?'ok':warn('Canal')?'warn':'unknown',detail:p.channel},
{label:'Rôle recherché',status:'ok',detail:creatorMixRole(p,context,query).title},
{label:'Budget',status:has('Budget')?'ok':warn('Budget')?'warn':'unknown',detail:p.price},
{label:'Format',status:p.deliverables&&p.deliverables!=='À préciser avec le créateur'?'ok':'unknown',detail:p.deliverables||'À préciser'},
{label:'Disponibilité',status:p.availability?'ok':'unknown',detail:p.availability||'À confirmer avec le créateur'},
{label:'Historique Ruche',status:stats.missions>0?'ok':'unknown',detail:stats.missions>0?stats.missions+' mission(s) Ruche':'Aucune mission Ruche pour l’instant'},
{label:'Fiabilité',status:stats.missions>0?(stats.proofRate>=.8?'ok':'warn'):'unknown',detail:stats.missions>0?Math.round(stats.proofRate*100)+'% de preuves conformes':'Pas encore d’historique'}
]}
function compatibilityFactorsHtml(p,context,query){return `<div class="sheet-section"><h3>Facteurs de l’indice de compatibilité</h3><p class="tiny" style="margin-bottom:7px">Cet indice aide à trier, il ne prédit pas un résultat. « À vérifier » signifie qu’aucune donnée réelle n’est disponible — Ruche ne l’invente pas.</p><div class="stack">${compatibilityFactors(p,context,query).map(f=>`<div class="row between" style="padding:6px 0;border-bottom:1px solid var(--line)"><span class="tiny"><b>${esc(f.label)}</b></span><span class="tiny" style="text-align:right;color:${f.status==='ok'?'var(--green)':f.status==='warn'?'var(--amber)':f.status==='low'?'var(--red)':'var(--muted)'}">${esc(f.detail)}</span></div>`).join('')}</div></div>`}
function reputationBadgesHtml(personId){return reputationBadges(personId).map(b=>badge(b.label,b.tone)).join('')}
function mixChainStage(roleTitle){const t=normalize(roleTitle);if(/attention/.test(t))return'Attirer';if(/credibilite|carriere/.test(t))return'Rassurer';if(/preuve sociale|reutilisable/.test(t))return'Montrer';if(/local|dark social|relais/.test(t))return'Diffuser';if(/closing|terrain/.test(t))return'Convertir';return'Compléter'}
const MIX_CHAIN=['Attirer','Rassurer','Montrer','Diffuser','Convertir'];
function mixChainHtml(activeStages){return `<div class="reference-line" style="margin-top:6px;flex-wrap:nowrap;overflow-x:auto">${MIX_CHAIN.map(s=>`<span class="pill ${activeStages.includes(s)?'tone-blue':''}" style="${activeStages.includes(s)?'':'opacity:.4'}">${s}</span>`).join('<span class="tiny" style="align-self:center">→</span>')}</div>`}
function creatorCard(p,selectable=false){const query=selectable?state.wizard.query:state.scoutQuery,context=selectable?matchingContext(state.wizard.targetId||''):null,diag=creatorDiagnosis(p,context,query),selected=selectable&&state.wizard.selected.includes(p.id),history=diag.history,role=creatorMixRole(p,context,query);return `<article class="profile-card ${selected?'selected':''}" data-fit="${diag.fit.key}" tabindex="-1"><div class="between center"><div class="row">${avatar(p)}<div class="person-copy"><b>${esc(p.name)}</b><small>${esc(p.channel)} · ${esc(marketOf(p))} · ${esc(followerLabel(p))}</small></div></div><span class="fit ${diag.fit.cls}" title="Indice interne ${diag.score}/99 — aide au tri, pas une probabilité">${diag.score}/99</span></div>${matchReasonHtml(diag)}${creatorReferencePills(p,diag)}<div class="creator-role-box"><b>Rôle proposé : ${esc(role.title)}</b><p>${esc(role.value)}</p></div><div class="creator-intel"><b>Pourquoi ce profil ?</b><p>${esc(creatorWhyText(p,context,query))}</p></div><div class="profile-signal"><div><b>${esc(audienceOf(p))}</b><span>audience</span></div><div><b>${esc(p.price)}</b><span>prix</span></div><div><b>${history.rdv||history.dossiers||history.inscrits||'—'}</b><span>signal historique</span></div></div><div class="profile-actions"><button class="secondary" onclick="openCreator('${p.id}','${state.wizard?.targetId||''}')">Voir la fiche</button>${selectable?`<button class="primary" onclick="toggleCreator('${p.id}')">${selected?'Retirer':'Ajouter'}</button>`:`<button class="primary" onclick="openCreator('${p.id}','')">Ouvrir</button>`}</div></article>`}
